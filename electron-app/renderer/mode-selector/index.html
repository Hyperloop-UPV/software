<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Seleccione Modo</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@500&display=swap');

    html,
    body {
      min-height: 100vh;
      margin: 0;
      overflow: hidden;
    }

    body {
      font-family: 'Roboto', sans-serif;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
      color: #fff;
      padding: 16px;
    }

    .card {
      position: relative;
      background: #20274c;
      padding: clamp(22px, 3.5vw, 32px);
      border-radius: 24px;
      width: min(660px, 100%);
      max-width: 660px;
      max-height: calc(100vh - 48px);
      text-align: center;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(237, 238, 240, 0.08);
      overflow: hidden;
    }

    .top-logo {
      position: relative;
      display: grid;
      place-items: center;
      margin-bottom: 18px;
    }

    .logo-background {
      position: absolute;
      left: 50%;
      bottom: -14px;
      width: clamp(260px, 60vw, 380px);
      max-width: 90%;
      transform: translateX(-50%);
      opacity: 0.06;
      filter: blur(1.4px) saturate(115%);
      pointer-events: none;
    }

    .logo-main,
    .logo-aux {
      position: relative;
      display: block;
      max-width: 100%;
      height: auto;
    }

    .logo-main {
      width: clamp(420px, 78vw, 520px);
      max-width: 100%;
      filter: brightness(0) invert(1);
      z-index: 2;
    }

    .logo-department {
      display: none;
    }

    .aux-logo-wrap {
      padding-top: 18px;
      display: grid;
      gap: 10px;
      justify-items: center;
    }

    .logo-aux {
      width: clamp(56px, 9vw, 76px);
      filter: brightness(0) invert(1);
      opacity: 0.72;
      margin: 0 auto;
    }

    .app-footer {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding-left: 6px;
      padding-right: 6px;
      font-size: 0.82rem;
      color: rgba(237, 238, 240, 0.72);
      opacity: 0.85;
      line-height: 1.4;
    }

    .app-footer .app-note {
      text-align: left;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .app-footer .app-copy {
      text-align: right;
      white-space: nowrap;
      opacity: 0.75;
    }

    .header {
      margin-bottom: 14px;
      position: relative;
      z-index: 2;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.6rem, 3.5vw, 2rem);
      line-height: 1.12;
      color: #edeef0;
      letter-spacing: -0.04em;
    }

    p {
      margin: 14px auto 0;
      font-size: clamp(0.94rem, 2.5vw, 1rem);
      color: #edeef0;
      opacity: 0.82;
      max-width: 360px;
    }

    .button-grid {
      display: grid;
      gap: 16px;
      margin-top: 28px;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    }

    button {
      margin: 0;
      padding: clamp(14px, 2vw, 16px) clamp(18px, 3vw, 20px);
      border-radius: 14px;
      border: none;
      cursor: pointer;
      font-size: clamp(0.96rem, 1.8vw, 1rem);
      font-weight: 700;
      transition: transform 150ms ease, box-shadow 150ms ease, background-color 150ms ease;
      min-height: 56px;
      letter-spacing: 0.01em;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .primary {
      background: #edeef0;
      color: #20274c;
      box-shadow: 0 18px 28px rgba(32, 39, 76, 0.16);
    }

    .secondary {
      background: rgba(237, 238, 240, 0.1);
      color: #edeef0;
      border: 1px solid rgba(237, 238, 240, 0.18);
      box-shadow: inset 0 0 0 1px rgba(237, 238, 240, 0.04);
    }

    @media (max-width: 420px) {
      .card {
        padding: 20px;
        border-radius: 20px;
      }

      .logo-background {
        bottom: -12px;
      }

      .button-grid {
        gap: 12px;
      }

      .aux-logo-wrap {
        padding-top: 12px;
      }
    }
  </style>
</head>

<body>
  <div class="card">
    <img src="src/Subsystem.png" alt="Departamento" class="logo-background" />
    <div class="top-logo">
      <img src="src/logo.svg" alt="Logo Hyperloop UPV" class="logo-main" />
    </div>
    <div class="header">
      <h1>Control Station</h1>
    </div>
    <div class="button-grid" id="button-grid"></div>
    <div class="aux-logo-wrap">
      <img src="src/sign.png" alt="Logo auxiliar" class="logo-aux" />
      <div class="app-footer">
        <div id="app-version" class="app-note">Versión de la app</div>
        <div class="app-copy">© HyperloopUPV - Software</div>
      </div>
    </div>
  </div>
  <script>
    const sendMode = (mode) => {
      if (window.electronAPI && window.electronAPI.setInitialMode) {
        window.electronAPI.setInitialMode(mode).catch(() => { }).finally(() => window.close());
      } else {
        try { window.ipcRenderer && window.ipcRenderer.send('set-initial-mode', mode); window.close(); } catch (e) { }
      }
    };

    const FALLBACK_VIEWS = [
      { mode: 'testing', label: 'Testing View' },
      { mode: 'competition', label: 'Competition View' },
      { mode: 'flashing', label: 'Flashing View' },
    ];

    async function renderButtons() {
      let views = FALLBACK_VIEWS;
      try {
        if (window.electronAPI?.getAvailableViews) {
          const available = await window.electronAPI.getAvailableViews();
          if (available && available.length > 0) views = available;
        }
      } catch (e) { }

      const grid = document.getElementById('button-grid');
      views.forEach(({ mode, label }, i) => {
        const btn = document.createElement('button');
        btn.id = mode;
        btn.className = i === 0 ? 'primary' : 'secondary';
        btn.textContent = label;
        btn.addEventListener('click', () => sendMode(mode));
        grid.appendChild(btn);
      });

      if (views.length === 1) {
        sendMode(views[0].mode);
      }
    }

    renderButtons();

    const appVersionNode = document.getElementById('app-version');
    if (appVersionNode && window.electronAPI?.getAppVersion) {
      window.electronAPI.getAppVersion().then((version) => {
        appVersionNode.textContent = `Versión: ${version}`;
      }).catch(() => {
        appVersionNode.textContent = 'Versión: desconocida';
      });
    }
  </script>
</body>

</html>
